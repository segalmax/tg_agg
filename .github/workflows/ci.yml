name: CI

on:
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: ${{ secrets.CI_DB_PASSWORD }}
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      SECRET_KEY: ${{ secrets.CI_SECRET_KEY }}
      DB_NAME: test_db
      DB_USER: postgres
      DB_PASSWORD: ${{ secrets.CI_DB_PASSWORD }}
      DB_HOST: localhost
      DB_PORT: "5432"
      DEBUG: "True"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - run: pip install -r requirements.txt

      - name: Lint
        run: ruff check tg_site/

      - name: Tests
        working-directory: tg_site
        run: python manage.py test videos.tests --noinput
