<form method="get" action="/" id="filterForm"
      data-default-date-from="{{ filters.default_date_from }}"
      data-default-date-to="{{ filters.default_date_to }}">
    <!-- Search -->
    <div class="mb-3">
        <label class="form-label fw-bold">🔍 Search</label>
        <div class="input-group input-group-sm">
            <span class="input-group-text"><i class="bi bi-search"></i></span>
            <input type="text" 
                   name="q" 
                   id="searchInput"
                   class="form-control" 
                   placeholder="Search posts..." 
                   value="{{ search_query|default:'' }}">
            <button class="btn btn-outline-secondary" 
                    type="button" 
                    id="clearSearch" 
                    style="display: {% if search_query %}block{% else %}none{% endif %};">
                <i class="bi bi-x-lg"></i>
            </button>
        </div>
        
        <!-- Search Type Options -->
        <div class="mt-2">
            <div class="form-check form-check-inline">
                <input class="form-check-input" 
                       type="checkbox" 
                       name="search_keywords" 
                       id="searchKeywords"
                       value="1"
                       {% if not request.GET.search_semantic or request.GET.search_keywords %}checked{% endif %}>
                <label class="form-check-label small" for="searchKeywords">
                    🔤 Keywords
                </label>
            </div>
            <div class="form-check form-check-inline">
                <input class="form-check-input" 
                       type="checkbox" 
                       name="search_semantic" 
                       id="searchSemantic"
                       value="1"
                       {% if request.GET.search_semantic %}checked{% endif %}>
                <label class="form-check-label small" for="searchSemantic">
                    🧠 Semantic
                </label>
            </div>
        </div>
        
        <small class="text-muted">Press Enter to search</small>
    </div>
    
    <!-- Channel Multi-Select -->
    <div class="mb-3">
        <label class="form-label fw-bold">📺 Channels</label>
        <div class="dropdown w-100">
            <button class="btn btn-sm btn-outline-secondary dropdown-toggle w-100 text-start" 
                    type="button" 
                    id="channelDropdown" 
                    data-bs-toggle="dropdown" 
                    data-bs-auto-close="outside"
                    aria-expanded="false">
                <span id="channelDropdownLabel">All Channels</span>
            </button>
            <div class="dropdown-menu w-100 p-2" aria-labelledby="channelDropdown" style="max-height: 300px; overflow-y: auto;">
                {% for ch in channels %}
                <div class="form-check">
                    <input class="form-check-input channel-checkbox" 
                           type="checkbox" 
                           value="{{ ch.username }}" 
                           id="channel_{{ ch.username }}"
                           {% if ch.username in filters.channels %}checked{% endif %}>
                    <label class="form-check-label small" for="channel_{{ ch.username }}">
                        {% if ch.title and ch.title != ch.username %}{{ ch.title }} <span class="text-muted">(@{{ ch.username }})</span>{% else %}{{ ch.username }}{% endif %}
                    </label>
                </div>
                {% empty %}
                <div class="text-muted small">No channels yet</div>
                {% endfor %}
                <div class="border-top pt-2 mt-1 d-flex gap-2 justify-content-between align-items-center flex-wrap">
                    <button type="button" class="btn btn-link btn-sm p-0 text-decoration-none" id="channelSelectAllBtn">Select all</button>
                    <button type="button" class="btn btn-link btn-sm p-0 text-decoration-none" id="channelClearAllBtn">Clear all</button>
                </div>
                <div class="pt-2 mt-1">
                    <button type="button" class="btn btn-primary btn-sm w-100" id="applyChannelsBtn">Apply</button>
                </div>
            </div>
        </div>
        <input type="hidden" name="channels" id="channelsInput" value="{{ filters.channels }}">
        
        <!-- Add Channel Inline -->
        <div class="mt-2 pt-2 border-top">
            <div class="input-group input-group-sm">
                <input type="text" 
                       class="form-control" 
                       id="newChannelUsername" 
                       placeholder="Add channel (username only)">
                <button class="btn btn-outline-primary" type="button" id="addChannelBtn">
                    <i class="bi bi-plus-lg"></i> Add
                </button>
            </div>
            <div id="addChannelFeedback" class="mt-1 small"></div>
        </div>
    </div>
    
    <!-- Media Type (Radio Buttons) -->
    <div class="mb-3">
        <label class="form-label fw-bold">🎬 Media Type</label>
        <div class="form-check">
            <input class="form-check-input media-radio" 
                   type="radio" 
                   name="media" 
                   value="all" 
                   id="media_all"
                   {% if filters.media == 'all' %}checked{% endif %}>
            <label class="form-check-label" for="media_all">All posts</label>
        </div>
        <div class="form-check">
            <input class="form-check-input media-radio" 
                   type="radio" 
                   name="media" 
                   value="video" 
                   id="media_video"
                   {% if filters.media == 'video' %}checked{% endif %}>
            <label class="form-check-label" for="media_video">Videos only</label>
        </div>
        <div class="form-check">
            <input class="form-check-input media-radio" 
                   type="radio" 
                   name="media" 
                   value="photo" 
                   id="media_photo"
                   {% if filters.media == 'photo' %}checked{% endif %}>
            <label class="form-check-label" for="media_photo">Photos only</label>
        </div>
        <div class="form-check">
            <input class="form-check-input media-radio" 
                   type="radio" 
                   name="media" 
                   value="has_media" 
                   id="media_has_media"
                   {% if filters.media == 'has_media' %}checked{% endif %}>
            <label class="form-check-label" for="media_has_media">Has media</label>
        </div>
    </div>
    
    <!-- Date Range -->
    <div class="mb-3">
        <label class="form-label fw-bold">📅 Date Range</label>
        <label class="form-label form-label-sm">From</label>
        <input type="date" 
               name="date_from" 
               id="dateFrom"
               class="form-control form-control-sm" 
               value="{{ filters.date_from|default:'' }}">
        <label class="form-label form-label-sm mt-2">To</label>
        <input type="date" 
               name="date_to" 
               id="dateTo"
               class="form-control form-control-sm" 
               value="{{ filters.date_to|default:'' }}">
    </div>
    
    <!-- Sort By -->
    <div class="mb-3">
        <label class="form-label fw-bold">⬆️ Sort By</label>
        <select name="sort" id="sortSelect" class="form-select form-select-sm">
            <option value="-trending" {% if filters.sort == '-trending' %}selected{% endif %} title="(views + forwards×30 + replies×5) ÷ (age_hours + 2)^1.5 — higher first">Trending (now)</option>
            <option value="-date" {% if filters.sort == '-date' %}selected{% endif %} title="Newest post date first">Newest First</option>
            <option value="date" {% if filters.sort == 'date' %}selected{% endif %} title="Oldest post date first">Oldest First</option>
            <option value="-views" {% if filters.sort == '-views' %}selected{% endif %} title="Highest views first">Most Views</option>
            <option value="-forwards" {% if filters.sort == '-forwards' %}selected{% endif %} title="Highest forwards first">Most Forwards</option>
            <option value="-replies" {% if filters.sort == '-replies' %}selected{% endif %} title="Highest replies first">Most Replies</option>
            <option value="-popular" {% if filters.sort == '-popular' %}selected{% endif %} title="views + forwards×30 + replies×5 — higher first">Popular (weighted)</option>
            <option value="-viral" {% if filters.sort == '-viral' %}selected{% endif %} title="forwards ÷ (views + 1) — higher first">Viral (most shared)</option>
        </select>
        <small id="sortFormulaHint" class="form-text text-muted d-block mt-1"></small>
    </div>
    
    <!-- Clear All Button -->
    <div id="clearAllContainer" style="display: none;">
        <a href="/" class="btn btn-secondary btn-sm w-100 mb-2">
            <i class="bi bi-x-circle"></i> Clear All Filters
        </a>
    </div>
</form>

<script>
// ====== Helper Functions ======
function showLoadingBar() {
    const bar = document.getElementById('loadingBar');
    if (bar) {
        bar.style.width = '0%';
        bar.style.display = 'block';
        setTimeout(() => bar.style.width = '90%', 10);
    }
}

function hideLoadingBar() {
    const bar = document.getElementById('loadingBar');
    if (bar) {
        bar.style.width = '100%';
        setTimeout(() => { bar.style.display = 'none'; }, 200);
    }
}

function htmxRefresh() {
    const form = document.getElementById('filterForm');
    const params = new URLSearchParams(new FormData(form));
    const url = '/?' + params.toString();
    history.pushState(null, '', url);
    htmx.ajax('GET', url, { target: '#grid-container', swap: 'innerHTML' });
}

const SORT_FORMULAS = {
    '-trending': 'Trending: (views + forwards×30 + replies×5) ÷ (age in hours + 2)^1.5 — higher ranks first.',
    '-date': 'Newest: ordered by post date, newest first.',
    'date': 'Oldest: ordered by post date, oldest first.',
    '-views': 'Most views: ordered by views count.',
    '-forwards': 'Most forwards: ordered by forwards count.',
    '-replies': 'Most replies: ordered by replies count.',
    '-popular': 'Popular (weighted): views + forwards×30 + replies×5 — higher first.',
    '-viral': 'Viral: forwards ÷ (views + 1) — higher first.',
};

function updateSortFormulaHint() {
    const sel = document.getElementById('sortSelect');
    const hint = document.getElementById('sortFormulaHint');
    if (!sel || !hint) return;
    hint.textContent = SORT_FORMULAS[sel.value] || '';
}

function datesMatchServerDefault() {
    const form = document.getElementById('filterForm');
    const defFrom = form?.dataset.defaultDateFrom;
    const defTo = form?.dataset.defaultDateTo ?? '';
    const dateFrom = document.getElementById('dateFrom').value;
    const dateTo = document.getElementById('dateTo').value;
    if (!defFrom) return true;
    if (window.location.pathname !== '/' && !dateFrom && !dateTo) return true;
    if (!defTo) {
        if (!dateFrom && !dateTo) return false;
        return dateFrom === defFrom && dateTo === '';
    }
    if (!dateFrom && !dateTo) return false;
    return dateFrom === defFrom && dateTo === defTo;
}

function hasActiveFilters() {
    const searchQuery = document.getElementById('searchInput').value.trim();
    const channels = document.getElementById('channelsInput').value.trim();
    const media = document.querySelector('input[name="media"]:checked').value;
    const sort = document.getElementById('sortSelect').value;
    const keywordsOn = document.getElementById('searchKeywords').checked;
    const semanticOn = document.getElementById('searchSemantic').checked;
    const searchNonDefault = semanticOn || !keywordsOn;
    return searchQuery || channels || media !== 'video' || !datesMatchServerDefault() || sort !== '-trending' || searchNonDefault;
}

function updateClearAllButton() {
    const container = document.getElementById('clearAllContainer');
    container.style.display = hasActiveFilters() ? 'block' : 'none';
}

function saveFiltersToStorage() {
    const channels = document.getElementById('channelsInput').value;
    // Deduplicate before saving to prevent accumulation
    const channelList = channels.split(',').filter(c => c.trim());
    const uniqueChannels = [...new Set(channelList)];
    localStorage.setItem('selectedChannels', uniqueChannels.join(','));
}

function loadFiltersFromStorage() {
    const savedChannels = localStorage.getItem('selectedChannels');
    if (savedChannels && !document.getElementById('channelsInput').value) {
        // Deduplicate saved channels before loading
        const channelList = savedChannels.split(',').filter(c => c.trim());
        const uniqueChannels = [...new Set(channelList)];
        document.getElementById('channelsInput').value = uniqueChannels.join(',');
        // Check the checkboxes
        uniqueChannels.forEach(username => {
            const checkbox = document.getElementById(`channel_${username.trim()}`);
            if (checkbox) checkbox.checked = true;
        });
        updateChannelDropdownLabel();
    }
}

// ====== Search Functionality ======
if (typeof searchInput === 'undefined') {
    var searchInput = document.getElementById('searchInput');
}
if (typeof clearSearchBtn === 'undefined') {
    var clearSearchBtn = document.getElementById('clearSearch');
}

searchInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') {
        e.preventDefault();
        htmxRefresh();
    }
});

searchInput.addEventListener('input', () => {
    clearSearchBtn.style.display = searchInput.value ? 'block' : 'none';
});

clearSearchBtn.addEventListener('click', () => {
    searchInput.value = '';
    clearSearchBtn.style.display = 'none';
    htmxRefresh();
});

// ====== Search Type Checkboxes ======
document.getElementById('searchKeywords').addEventListener('change', () => {
    updateClearAllButton();
    if (searchInput.value.trim()) htmxRefresh();
});

document.getElementById('searchSemantic').addEventListener('change', () => {
    updateClearAllButton();
    if (searchInput.value.trim()) htmxRefresh();
});

// ====== Channel Multi-Select ======
function updateChannelDropdownLabel() {
    const checkboxes = document.querySelectorAll('.channel-checkbox:checked');
    const label = document.getElementById('channelDropdownLabel');
    
    // Get unique channel values (handles duplicate checkboxes from responsive design)
    const uniqueChannels = [...new Set(Array.from(checkboxes).map(cb => cb.value))];
    const count = uniqueChannels.length;
    
    if (count === 0) {
        label.textContent = 'All Channels';
    } else if (count === 1) {
        // Use the checkbox value (username) directly instead of label text
        label.textContent = uniqueChannels[0];
    } else {
        label.textContent = `${count} channels selected`;
    }
}

function updateChannelsInput() {
    const checkboxes = document.querySelectorAll('.channel-checkbox:checked');
    const values = Array.from(checkboxes).map(cb => cb.value);
    // Deduplicate to prevent duplicates from accumulating
    const uniqueValues = [...new Set(values)];
    document.getElementById('channelsInput').value = uniqueValues.join(',');
    updateChannelDropdownLabel();
    saveFiltersToStorage();
}

document.querySelectorAll('.channel-checkbox').forEach(checkbox => {
    checkbox.addEventListener('change', (e) => {
        // Sync with duplicate checkbox (for responsive design - desktop & mobile)
        const value = e.target.value;
        const checked = e.target.checked;
        document.querySelectorAll(`.channel-checkbox[value="${value}"]`).forEach(cb => {
            if (cb !== e.target) cb.checked = checked;
        });
        updateChannelsInput();
        updateClearAllButton();
    });
});

document.getElementById('applyChannelsBtn').addEventListener('click', () => {
    htmxRefresh();
});

document.getElementById('channelSelectAllBtn').addEventListener('click', (e) => {
    e.preventDefault();
    document.querySelectorAll('.channel-checkbox').forEach(cb => { cb.checked = true; });
    updateChannelsInput();
    updateClearAllButton();
});

document.getElementById('channelClearAllBtn').addEventListener('click', (e) => {
    e.preventDefault();
    document.querySelectorAll('.channel-checkbox').forEach(cb => { cb.checked = false; });
    updateChannelsInput();
    updateClearAllButton();
});

// ====== Media Type Radio Buttons ======
document.querySelectorAll('.media-radio').forEach(radio => {
    radio.addEventListener('change', () => {
        updateClearAllButton();
        htmxRefresh();
    });
});

// ====== Date Range ======
['dateFrom', 'dateTo'].forEach(id => {
    const el = document.getElementById(id);
    el.addEventListener('change', () => { updateClearAllButton(); htmxRefresh(); });
    el.addEventListener('blur', () => { updateClearAllButton(); });
    el.addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); updateClearAllButton(); htmxRefresh(); } });
});

// ====== Sort By ======
document.getElementById('sortSelect').addEventListener('change', () => {
    updateSortFormulaHint();
    updateClearAllButton();
    htmxRefresh();
});

// ====== Add Channel ======
document.getElementById('addChannelBtn').addEventListener('click', async () => {
    const input = document.getElementById('newChannelUsername');
    const feedback = document.getElementById('addChannelFeedback');
    const btn = document.getElementById('addChannelBtn');
    const username = input.value.trim().replace('@', '');
    
    if (!username) {
        feedback.innerHTML = '<span class="text-warning">⚠️ Enter a channel username</span>';
        return;
    }
    
    // Disable button and show loading
    btn.disabled = true;
    feedback.innerHTML = '<span class="text-info"><div class="spinner-border spinner-border-sm" role="status"></div> Adding channel...</span>';
    
    try {
        const response = await fetch('/api/channel/add/', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded',
            },
            body: `username=${encodeURIComponent(username)}`
        });
        
        const data = await response.json();
        
        if (data.success) {
            feedback.innerHTML = `<span class="text-success">✅ ${data.message}</span>`;
            input.value = '';
            
            // Reload page after 1.5 seconds to show new channel
            setTimeout(() => {
                window.location.reload();
            }, 1500);
        } else {
            feedback.innerHTML = `<span class="text-danger">❌ ${data.error}</span>`;
            btn.disabled = false;
        }
    } catch (error) {
        feedback.innerHTML = '<span class="text-danger">❌ Network error</span>';
        btn.disabled = false;
    }
});

// ====== Initialization ======
updateChannelDropdownLabel();
updateSortFormulaHint();
updateClearAllButton();
loadFiltersFromStorage();

window.addEventListener('load', hideLoadingBar);
</script>
